name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ─── Guard : ce workflow est inerte tant que les secrets FTP ne sont
      # pas configurés. Évite que les runs failent sur le repo template (qui
      # n'a pas de serveur Hostinger associé). Quand tu forke le template
      # vers un vrai site, ajoute FTP_SERVER/FTP_USERNAME/FTP_PASSWORD dans
      # les Repo Secrets et le workflow se débloque automatiquement.
      - name: Check FTP secrets configured
        id: guard
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "FTP_SERVER secret not set — skipping deploy (template repo)"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm ci

      - name: Build
        if: steps.guard.outputs.skip != 'true'
        run: npm run build

      - name: Install lftp
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        if: steps.guard.outputs.skip != 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, subprocess, tempfile, time

          script = "\n".join([
            "set net:timeout 60",
            "set net:max-retries 5",
            "set net:reconnect-interval-base 5",
            "set net:reconnect-interval-multiplier 1",
            "set net:reconnect-interval-max 15",
            "set ssl:verify-certificate no",
            "set ftp:ssl-allow yes",
            "set mirror:parallel-transfer-count 4",
            "set mirror:use-pget-n 4",
            f"open ftp://{os.environ['FTP_HOST']}",
            f"user {os.environ['FTP_USER']} {os.environ['FTP_PASS']}",
            "mirror --reverse --delete --verbose --only-newer --parallel=4 dist/ /public_html/",
            "quit",
          ])

          for attempt in range(1, 4):
            with tempfile.NamedTemporaryFile(mode='w', suffix='.lftp', delete=False) as f:
              f.write(script)
              tmp = f.name
            result = subprocess.run(["lftp", "-f", tmp], capture_output=False)
            os.unlink(tmp)
            if result.returncode == 0:
              break
            print(f"Attempt {attempt} failed, retrying in 15s...")
            time.sleep(15)

          exit(result.returncode)
          EOF
